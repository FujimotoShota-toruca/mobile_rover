services:
  - type: web
    name: phone-web-telemetry-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: ^https://.*$
